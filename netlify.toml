[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && prisma generate && npm run setup:prod && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_APP_URL: defina manualmente no painel Netlify (Site Settings → Environment Variables)
  # com a URL do seu site (ex: https://seusite.netlify.app).
  # Os links de e-mail já usam process.env.URL (variável built-in do Netlify, disponível em
  # runtime nos API routes) como fallback — ver src/lib/email.ts.
