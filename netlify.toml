[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && prisma generate && npm run setup:prod && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # $URL é injetado automaticamente pelo Netlify com a URL do deploy.
  # Garante que os links de e-mail (reset de senha, verificação) apontem para o domínio correto.
  # Se você tiver um domínio customizado, defina NEXT_PUBLIC_APP_URL manualmente
  # nas Environment Variables do painel Netlify (Site Settings → Environment Variables).
  NEXT_PUBLIC_APP_URL = "$URL"
